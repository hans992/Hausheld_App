# Alembic config for Hausheld (PostgreSQL + PostGIS)
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Use port 6543 for Supabase pooler (not 5432). Prefer DATABASE_URL in .env to avoid committing secrets.
# sqlalchemy.url = postgresql+asyncpg://postgres.PROJECT_REF:YOUR_DB_PASSWORD@aws-0-eu-central-1.pooler.supabase.com:6543/postgres

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
